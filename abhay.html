<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Abhay! 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Lobster&family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #FFD700;
    --orange: #FF6B35;
    --pink: #FF3CAC;
    --purple: #784BA0;
    --blue: #2B86C5;
    --dark: #0a0015;
  }

  body {
    background: var(--dark);
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ---- STARS BACKGROUND ---- */
  #stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ---- BALLOONS ---- */
  .balloons-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .balloon {
    position: absolute;
    bottom: -150px;
    width: 60px;
    height: 75px;
    border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
    opacity: 0.9;
    animation: floatUp linear infinite;
  }
  .balloon::after {
    content: '';
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 1.5px;
    height: 20px;
    background: rgba(255,255,255,0.5);
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(-5deg); opacity: 0.9; }
    50%  { transform: translateY(-50vh) rotate(5deg); }
    100% { transform: translateY(-110vh) rotate(-3deg); opacity: 0; }
  }

  /* ---- CONFETTI ---- */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -20px;
    opacity: 0;
    animation: confettiFall linear infinite;
    z-index: 2;
    pointer-events: none;
    border-radius: 2px;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
  }

  /* ---- MAIN CARD ---- */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 50px 40px 60px;
    max-width: 680px;
    width: 90%;
    background: linear-gradient(135deg, rgba(120,75,160,0.25), rgba(43,134,197,0.2));
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 30px;
    backdrop-filter: blur(14px);
    box-shadow: 0 0 60px rgba(255,60,172,0.25), 0 0 120px rgba(120,75,160,0.15);
    animation: cardIn 1s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.7) translateY(60px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ---- CAKE ---- */
  .cake-wrap {
    margin-bottom: 24px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }
  .cake-emoji {
    font-size: 90px;
    filter: drop-shadow(0 0 20px #FFD700);
  }

  /* ---- TEXT ---- */
  .happy-text {
    font-family: 'Pacifico', cursive;
    font-size: clamp(2rem, 8vw, 3.8rem);
    background: linear-gradient(90deg, #FFD700, #FF6B35, #FF3CAC, #784BA0, #2B86C5, #FFD700);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite, textBounce 0.8s ease both 0.4s;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  @keyframes shimmer {
    0%   { background-position: 0%; }
    100% { background-position: 300%; }
  }
  @keyframes textBounce {
    0%   { opacity:0; transform: scale(0.5) rotate(-10deg); }
    70%  { transform: scale(1.1) rotate(3deg); }
    100% { opacity:1; transform: scale(1) rotate(0deg); }
  }

  .birthday-text {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.6rem, 6vw, 3rem);
    color: white;
    animation: textBounce 0.8s ease both 0.7s;
    opacity: 0;
    text-shadow: 0 0 30px rgba(255,107,53,0.8);
    animation-fill-mode: both;
    margin-bottom: 16px;
  }

  .name-text {
    font-family: 'Lobster', cursive;
    font-size: clamp(3.5rem, 14vw, 7rem);
    background: linear-gradient(90deg, #FFD700 0%, #FF6B35 30%, #FF3CAC 60%, #FFD700 100%);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 2s linear infinite, namePop 0.9s cubic-bezier(0.34,1.56,0.64,1) both 1s;
    text-shadow: none;
    filter: drop-shadow(0 0 18px rgba(255,215,0,0.6));
    line-height: 1;
    margin-bottom: 30px;
  }
  @keyframes namePop {
    0%   { opacity:0; transform: scale(0.3); }
    100% { opacity:1; transform: scale(1); }
  }

  /* ---- DIVIDER ---- */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 auto 28px;
    width: 80%;
  }
  .divider-line {
    flex: 1;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, #FFD700, transparent);
  }
  .divider span { font-size: 1.4rem; }

  /* ---- MESSAGE ---- */
  .message {
    font-size: clamp(1rem, 3vw, 1.2rem);
    color: rgba(255,255,255,0.88);
    line-height: 1.8;
    animation: fadeSlideUp 0.8s ease both 1.4s;
    margin-bottom: 30px;
  }
  @keyframes fadeSlideUp {
    from { opacity:0; transform: translateY(25px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* ---- EMOJI PARTY ROW ---- */
  .emoji-row {
    font-size: 2rem;
    letter-spacing: 8px;
    animation: fadeSlideUp 0.8s ease both 1.7s;
    margin-bottom: 34px;
  }
  .emoji-row span {
    display: inline-block;
    animation: emojiDance 1.4s ease-in-out infinite;
  }
  .emoji-row span:nth-child(2)  { animation-delay: 0.15s; }
  .emoji-row span:nth-child(3)  { animation-delay: 0.3s; }
  .emoji-row span:nth-child(4)  { animation-delay: 0.45s; }
  .emoji-row span:nth-child(5)  { animation-delay: 0.6s; }
  .emoji-row span:nth-child(6)  { animation-delay: 0.75s; }
  @keyframes emojiDance {
    0%,100% { transform: translateY(0) rotate(0deg) scale(1); }
    30%      { transform: translateY(-10px) rotate(-8deg) scale(1.2); }
    60%      { transform: translateY(-5px) rotate(6deg) scale(1.1); }
  }

  /* ---- BUTTON ---- */
  .party-btn {
    display: inline-block;
    padding: 14px 44px;
    background: linear-gradient(135deg, #FF6B35, #FF3CAC, #784BA0);
    background-size: 200%;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    letter-spacing: 1.5px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 8px 32px rgba(255,60,172,0.5);
    animation: fadeSlideUp 0.8s ease both 2s, btnPulse 2s ease-in-out infinite 2.5s;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .party-btn:hover {
    transform: scale(1.07) translateY(-3px);
    box-shadow: 0 12px 40px rgba(255,60,172,0.7);
  }
  @keyframes btnPulse {
    0%,100% { box-shadow: 0 8px 32px rgba(255,60,172,0.5); }
    50%      { box-shadow: 0 8px 60px rgba(255,215,0,0.7); }
  }

  /* ---- FIREWORK SPARKS ---- */
  .spark {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 20;
    animation: sparkFly 0.9s ease-out forwards;
  }
  @keyframes sparkFly {
    0%   { opacity:1; transform: translate(0,0) scale(1); }
    100% { opacity:0; transform: var(--tx) scale(0); }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="balloons-wrap" id="balloons"></div>

<div class="card">
  <div class="cake-wrap">
    <div class="cake-emoji">🎂</div>
  </div>

  <div class="happy-text">Happy</div>
  <div class="birthday-text">Birthday</div>
  <div class="name-text">Abhay!</div>

  <div class="divider">
    <div class="divider-line"></div>
    <span>🎊</span>
    <div class="divider-line"></div>
  </div>

  <p class="message">
    Bhai Abhay, aaj tera special din hai! 🌟<br>
    I wish this Birthday brings new opportunities in your life<br>
    <strong style="color:#FFD700;">bahut bahut bahut pyaar!</strong> ❤️
  </p>

  <div class="emoji-row">
    <span>🎉</span><span>🥳</span><span>🎁</span><span>🎈</span><span>✨</span><span>🎊</span>
  </div>

  <button class="party-btn" onclick="bigBang()">🎆 Party Time! 🎆</button>
</div>

<script>
// ---- STARS ----
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length: 160}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.8 + 0.3,
    a: Math.random(),
    da: (Math.random() - 0.5) * 0.012
  }));
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.a = Math.max(0.1, Math.min(1, s.a + s.da));
    if (s.a <= 0.1 || s.a >= 1) s.da *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ---- CONFETTI ----
const colors = ['#FFD700','#FF6B35','#FF3CAC','#784BA0','#2B86C5','#00ffaa','#ff4444','#fff'];
function makeConfetti() {
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}vw;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${Math.random()*10+6}px;
      height: ${Math.random()*6+4}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${Math.random()*3+2.5}s;
      animation-delay: ${Math.random()*5}s;
    `;
    document.body.appendChild(el);
  }
}
makeConfetti();

// ---- BALLOONS ----
const balloonColors = ['#FF6B35','#FF3CAC','#FFD700','#784BA0','#2B86C5','#00e5a0'];
const wrap = document.getElementById('balloons');
for (let i = 0; i < 14; i++) {
  const b = document.createElement('div');
  b.className = 'balloon';
  const c = balloonColors[i % balloonColors.length];
  b.style.cssText = `
    left: ${Math.random()*100}vw;
    background: ${c};
    box-shadow: inset -8px -8px 20px rgba(0,0,0,0.2), 0 0 16px ${c}88;
    animation-duration: ${Math.random()*6+7}s;
    animation-delay: ${Math.random()*8}s;
    width: ${Math.random()*30+50}px;
  `;
  wrap.appendChild(b);
}

// ---- FIREWORK / SPARK on button ----
function bigBang() {
  const colors2 = ['#FFD700','#FF6B35','#FF3CAC','#00ffaa','#2B86C5','#fff','#ff4444'];
  for (let burst = 0; burst < 5; burst++) {
    setTimeout(() => {
      const bx = Math.random() * window.innerWidth;
      const by = Math.random() * window.innerHeight * 0.7;
      for (let i = 0; i < 22; i++) {
        const spark = document.createElement('div');
        spark.className = 'spark';
        const angle = (i / 22) * 2 * Math.PI;
        const dist = Math.random() * 100 + 60;
        const tx = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        spark.style.cssText = `
          left: ${bx}px; top: ${by}px;
          background: ${colors2[Math.floor(Math.random()*colors2.length)]};
          --tx: ${tx};
          animation-duration: ${Math.random()*0.4+0.7}s;
          animation-delay: ${Math.random()*0.2}s;
          width: ${Math.random()*5+4}px; height: ${Math.random()*5+4}px;
        `;
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 1200);
      }
    }, burst * 220);
  }

  // Extra confetti burst
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}vw;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${Math.random()*10+6}px;
      height: ${Math.random()*6+4}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${Math.random()*2+2}s;
      animation-delay: 0s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}
</script>
</body>
</html>
